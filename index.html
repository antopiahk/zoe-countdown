<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Counting down to you, Zoe</title>
    <meta name="description" content="Every second closer to you.">
    <meta property="og:title" content="Counting down to Zoe">
    <meta property="og:description" content="Every second closer to you.">
    <meta name="theme-color" content="#0a0a1a">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            -webkit-font-smoothing: antialiased;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            text-align: center;
            padding: 1.5rem;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Photo frame */
        .photo-frame {
            width: clamp(90px, 20vw, 130px);
            height: clamp(90px, 20vw, 130px);
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 1.5rem;
            position: relative;
            flex-shrink: 0;
        }

        .photo-frame::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #ff6b6b);
            z-index: -1;
            animation: ringRotate 4s linear infinite;
        }

        @keyframes ringRotate {
            to { transform: rotate(360deg); }
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #0a0a1a;
            display: block;
        }

        .header {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1rem, 2.5vw, 1.6rem);
            font-weight: 300;
            font-style: italic;
            color: rgba(255, 200, 150, 0.7);
            letter-spacing: 0.15em;
            text-transform: lowercase;
            margin-bottom: clamp(1rem, 3vh, 2rem);
        }

        .countdown {
            display: flex;
            align-items: flex-start;
            gap: clamp(0.4rem, 2vw, 1.5rem);
            margin-bottom: clamp(1.2rem, 3vh, 2.5rem);
        }

        .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: clamp(50px, 12vw, 90px);
        }

        .number {
            font-size: clamp(2.8rem, 9vw, 6.5rem);
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 40%, #ffd93d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 25px rgba(255, 107, 107, 0.25));
            transition: transform 0.15s ease;
            font-variant-numeric: tabular-nums;
        }

        .number.tick {
            transform: scale(1.05);
        }

        .label {
            font-size: clamp(0.55rem, 1.2vw, 0.8rem);
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 0.4rem;
        }

        .sep {
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 200;
            color: rgba(255, 107, 107, 0.2);
            padding-top: clamp(0.3rem, 1vw, 0.7rem);
            user-select: none;
        }

        .message {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.3rem, 3.5vw, 2.2rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 0.3rem;
        }

        .message em {
            font-style: italic;
            font-weight: 400;
            color: #ff6b6b;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #ff6b6b;
            border-radius: 50%;
            margin: clamp(0.8rem, 2vh, 1.5rem) auto;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.5);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 15px 8px rgba(255, 107, 107, 0);
                transform: scale(1.3);
            }
        }

        .date {
            font-size: clamp(0.6rem, 1.3vw, 0.78rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        /* Arrived state */
        .content.arrived .countdown { display: none; }
        .content.arrived .header { display: none; }
        .content.arrived .pulse-dot { display: none; }
        .content.arrived .date { display: none; }

        .arrived-msg {
            display: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 300;
            font-style: italic;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeIn 2s ease-out;
        }

        .content.arrived .arrived-msg { display: block; }
        .content.arrived .message { display: none; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="content" id="content">
        <div class="photo-frame">
            <img src="photo.jpg" alt="Us" onerror="this.parentElement.style.display='none'">
        </div>

        <div class="header">counting down</div>

        <div class="countdown">
            <div class="unit">
                <span class="number" id="d">00</span>
                <span class="label">days</span>
            </div>
            <span class="sep">:</span>
            <div class="unit">
                <span class="number" id="h">00</span>
                <span class="label">hours</span>
            </div>
            <span class="sep">:</span>
            <div class="unit">
                <span class="number" id="m">00</span>
                <span class="label">minutes</span>
            </div>
            <span class="sep">:</span>
            <div class="unit">
                <span class="number" id="s">00</span>
                <span class="label">seconds</span>
            </div>
        </div>

        <div class="message">until I'm with you, <em>Zoe</em></div>
        <div class="arrived-msg">I'm here.</div>

        <div class="pulse-dot"></div>
        <div class="date">May 16, 2026 &middot; 4:46 PM &middot; Guadalajara</div>
    </div>

    <script>
    (() => {
        // May 16 2026, 4:46 PM GDL (UTC-6, Mexico standard time year-round)
        const TARGET = new Date('2026-05-16T16:46:00-06:00').getTime();

        const $d = document.getElementById('d');
        const $h = document.getElementById('h');
        const $m = document.getElementById('m');
        const $s = document.getElementById('s');
        const $content = document.getElementById('content');

        function pad(n) { return String(n).padStart(2, '0'); }

        function tickAnim(el) {
            el.classList.add('tick');
            setTimeout(() => el.classList.remove('tick'), 150);
        }

        let prev = { d: '', h: '', m: '', s: '' };

        function update() {
            const diff = Math.max(0, TARGET - Date.now());

            if (diff === 0) {
                $content.classList.add('arrived');
                return;
            }

            const days = pad(Math.floor(diff / 864e5));
            const hours = pad(Math.floor((diff % 864e5) / 36e5));
            const mins = pad(Math.floor((diff % 36e5) / 6e4));
            const secs = pad(Math.floor((diff % 6e4) / 1e3));

            if (days !== prev.d) { $d.textContent = days; tickAnim($d); prev.d = days; }
            if (hours !== prev.h) { $h.textContent = hours; tickAnim($h); prev.h = hours; }
            if (mins !== prev.m) { $m.textContent = mins; tickAnim($m); prev.m = mins; }
            if (secs !== prev.s) { $s.textContent = secs; tickAnim($s); prev.s = secs; }
        }

        update();
        setInterval(update, 250);

        // --- Canvas: starfield + orbiting convergence ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        function resize() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        // Stars
        const STAR_COUNT = Math.min(180, Math.floor(window.innerWidth * window.innerHeight / 5000));
        let stars = [];
        function makeStars() {
            stars = Array.from({ length: STAR_COUNT }, () => ({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 1.2 + 0.3,
                phase: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.8 + 0.3,
                base: Math.random() * 0.35 + 0.1,
            }));
        }
        makeStars();
        window.addEventListener('resize', makeStars);

        // Floating particles (warm bokeh)
        const BOKEH_COUNT = 25;
        let bokehs = [];
        function makeBokehs() {
            bokehs = Array.from({ length: BOKEH_COUNT }, () => ({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 30 + 10,
                vx: (Math.random() - 0.5) * 0.15,
                vy: -(Math.random() * 0.2 + 0.05),
                hue: Math.random() > 0.5 ? '255,107,107' : '255,217,61',
                alpha: Math.random() * 0.04 + 0.015,
            }));
        }
        makeBokehs();

        // Orbit state
        let angle = 0;
        const trails = [];
        const MAX_TRAILS = 200;

        function progress() {
            const span = 100 * 864e5; // 100 days
            const start = TARGET - span;
            return Math.min(1, Math.max(0, (Date.now() - start) / span));
        }

        function draw() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const t = performance.now() * 0.001;

            // Background
            const bg = ctx.createLinearGradient(0, 0, w * 0.3, h);
            bg.addColorStop(0, '#0a0a1a');
            bg.addColorStop(0.5, '#0e0815');
            bg.addColorStop(1, '#120a10');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, w, h);

            // Stars
            for (const s of stars) {
                const a = s.base + Math.sin(t * s.speed + s.phase) * 0.15;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${Math.max(0.02, a)})`;
                ctx.fill();
            }

            // Bokeh
            for (const b of bokehs) {
                b.x += b.vx;
                b.y += b.vy;
                if (b.y < -b.r) { b.y = h + b.r; b.x = Math.random() * w; }
                if (b.x < -b.r) b.x = w + b.r;
                if (b.x > w + b.r) b.x = -b.r;

                const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
                g.addColorStop(0, `rgba(${b.hue},${b.alpha * 2})`);
                g.addColorStop(1, `rgba(${b.hue},0)`);
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fillStyle = g;
                ctx.fill();
            }

            // Orbiting particles
            const p = progress();
            const maxR = Math.min(w, h) * 0.18;
            const orbitR = maxR * (1 - p * 0.88);
            const cx = w / 2;
            const cy = h / 2;

            angle += 0.003 + p * 0.004;

            const x1 = cx + Math.cos(angle) * orbitR;
            const y1 = cy + Math.sin(angle) * orbitR * 0.6; // elliptical
            const x2 = cx + Math.cos(angle + Math.PI) * orbitR;
            const y2 = cy + Math.sin(angle + Math.PI) * orbitR * 0.6;

            // Trails
            trails.push({ x: x1, y: y1, life: 1, c: '255,107,107' });
            trails.push({ x: x2, y: y2, life: 1, c: '255,217,61' });

            for (let i = trails.length - 1; i >= 0; i--) {
                const tr = trails[i];
                tr.life -= 0.018;
                if (tr.life <= 0) { trails.splice(i, 1); continue; }
                ctx.beginPath();
                ctx.arc(tr.x, tr.y, 2.5 * tr.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${tr.c},${tr.life * 0.3})`;
                ctx.fill();
            }
            if (trails.length > MAX_TRAILS) trails.splice(0, trails.length - MAX_TRAILS);

            // Connection thread
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = `rgba(255,180,120,${0.03 + p * 0.06})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();

            // Glow + core for particle 1
            const g1 = ctx.createRadialGradient(x1, y1, 0, x1, y1, 18);
            g1.addColorStop(0, 'rgba(255,107,107,0.7)');
            g1.addColorStop(0.5, 'rgba(255,107,107,0.15)');
            g1.addColorStop(1, 'rgba(255,107,107,0)');
            ctx.beginPath(); ctx.arc(x1, y1, 18, 0, Math.PI * 2);
            ctx.fillStyle = g1; ctx.fill();
            ctx.beginPath(); ctx.arc(x1, y1, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#ff6b6b'; ctx.fill();

            // Glow + core for particle 2
            const g2 = ctx.createRadialGradient(x2, y2, 0, x2, y2, 18);
            g2.addColorStop(0, 'rgba(255,217,61,0.7)');
            g2.addColorStop(0.5, 'rgba(255,217,61,0.15)');
            g2.addColorStop(1, 'rgba(255,217,61,0)');
            ctx.beginPath(); ctx.arc(x2, y2, 18, 0, Math.PI * 2);
            ctx.fillStyle = g2; ctx.fill();
            ctx.beginPath(); ctx.arc(x2, y2, 3, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd93d'; ctx.fill();

            requestAnimationFrame(draw);
        }

        draw();
    })();
    </script>
</body>
</html>
