<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zoe</title>
    <meta name="theme-color" content="#0a0a1a">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            color: #fff;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            -webkit-font-smoothing: antialiased;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* --- Floating polaroids --- */
        .polaroid {
            position: fixed;
            z-index: 1;
            background: #fff;
            padding: 6px 6px 22px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 60px rgba(255,107,107,0.05);
            opacity: 0;
            animation: floatIn 1.8s ease-out forwards;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        .polaroid img {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1;
            object-fit: cover;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- Center content --- */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            text-align: center;
            padding: 1.5rem;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 300;
            font-style: italic;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 50%, #ffd93d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 40px rgba(255, 107, 107, 0.2));
            line-height: 1;
            margin-bottom: clamp(1.5rem, 4vh, 3rem);
        }

        .countdown {
            display: flex;
            align-items: flex-start;
            gap: clamp(0.4rem, 2vw, 1.5rem);
            margin-bottom: clamp(1.5rem, 4vh, 3rem);
        }

        .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: clamp(48px, 12vw, 85px);
        }

        .number {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 700;
            line-height: 1;
            color: rgba(255, 255, 255, 0.9);
            transition: transform 0.15s ease;
            font-variant-numeric: tabular-nums;
        }

        .number.tick { transform: scale(1.04); }

        .label {
            font-size: clamp(0.5rem, 1.1vw, 0.7rem);
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 0.4rem;
        }

        .sep {
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 200;
            color: rgba(255, 255, 255, 0.1);
            padding-top: clamp(0.3rem, 1vw, 0.6rem);
            user-select: none;
        }

        .date {
            font-size: clamp(0.6rem, 1.2vw, 0.75rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.15);
            text-transform: uppercase;
        }

        .pulse-dot {
            width: 4px;
            height: 4px;
            background: rgba(255, 107, 107, 0.6);
            border-radius: 50%;
            margin: clamp(0.6rem, 2vh, 1.2rem) auto;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.4); }
            50% { box-shadow: 0 0 12px 6px rgba(255,107,107,0); }
        }

        /* Arrived state */
        .content.arrived .countdown,
        .content.arrived .pulse-dot,
        .content.arrived .date { display: none; }

        .arrived-msg {
            display: none;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            font-style: italic;
            color: rgba(255,255,255,0.7);
            animation: fadeIn 2s ease-out;
        }

        .content.arrived .arrived-msg { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Polaroids injected by JS -->

    <div class="content" id="content">
        <div class="name">Zoe</div>

        <div class="countdown">
            <div class="unit">
                <span class="number" id="d">00</span>
                <span class="label">days</span>
            </div>
            <span class="sep">:</span>
            <div class="unit">
                <span class="number" id="h">00</span>
                <span class="label">hours</span>
            </div>
            <span class="sep">:</span>
            <div class="unit">
                <span class="number" id="m">00</span>
                <span class="label">minutes</span>
            </div>
            <span class="sep">:</span>
            <div class="unit">
                <span class="number" id="s">00</span>
                <span class="label">seconds</span>
            </div>
        </div>

        <div class="arrived-msg">I'm here.</div>

        <div class="pulse-dot"></div>
        <div class="date">May 16 &middot; Guadalajara</div>
    </div>

    <script>
    (() => {
        // === COUNTDOWN ===
        const TARGET = new Date('2026-05-16T16:46:00-06:00').getTime();
        const $d = document.getElementById('d');
        const $h = document.getElementById('h');
        const $m = document.getElementById('m');
        const $s = document.getElementById('s');
        const $content = document.getElementById('content');

        const pad = n => String(n).padStart(2, '0');
        const tickAnim = el => { el.classList.add('tick'); setTimeout(() => el.classList.remove('tick'), 150); };
        let prev = {};

        function update() {
            const diff = Math.max(0, TARGET - Date.now());
            if (diff === 0) { $content.classList.add('arrived'); return; }

            const vals = {
                d: pad(Math.floor(diff / 864e5)),
                h: pad(Math.floor((diff % 864e5) / 36e5)),
                m: pad(Math.floor((diff % 36e5) / 6e4)),
                s: pad(Math.floor((diff % 6e4) / 1e3)),
            };

            const els = { d: $d, h: $h, m: $m, s: $s };
            for (const k in vals) {
                if (vals[k] !== prev[k]) { els[k].textContent = vals[k]; tickAnim(els[k]); prev[k] = vals[k]; }
            }
        }
        update();
        setInterval(update, 250);

        // === FLOATING POLAROIDS ===
        const photos = [
            'img/821e38e3.jpg', 'img/c856d790.jpg', 'img/dc6ca7ac.jpg',
            'img/fee05b7a.jpg', 'img/9dbad240.jpg', 'img/7f23b378.jpg',
            'img/f0df0bd0.jpg', 'img/IMG_1831.jpg'
        ];

        const isMobile = window.innerWidth < 700;
        const SIZE = isMobile ? 100 : 150;

        // Placement zones: edges and corners, avoiding center
        function randomEdgePos() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const margin = 20;
            const centerX = w / 2, centerY = h / 2;
            const deadZoneX = w * 0.22, deadZoneY = h * 0.25;

            let x, y, attempts = 0;
            do {
                // Bias toward edges
                const side = Math.random();
                if (side < 0.25) { x = margin + Math.random() * (w * 0.2); y = margin + Math.random() * (h - margin * 2 - SIZE); }
                else if (side < 0.5) { x = w - margin - SIZE - Math.random() * (w * 0.2); y = margin + Math.random() * (h - margin * 2 - SIZE); }
                else if (side < 0.75) { x = margin + Math.random() * (w - margin * 2 - SIZE); y = margin + Math.random() * (h * 0.18); }
                else { x = margin + Math.random() * (w - margin * 2 - SIZE); y = h - margin - SIZE - Math.random() * (h * 0.18); }
                attempts++;
            } while (Math.abs(x + SIZE/2 - centerX) < deadZoneX && Math.abs(y + SIZE/2 - centerY) < deadZoneY && attempts < 20);

            return { x, y };
        }

        const polaroids = [];

        photos.forEach((src, i) => {
            const el = document.createElement('div');
            el.className = 'polaroid';
            const img = document.createElement('img');
            img.src = src;
            img.alt = '';
            img.loading = 'lazy';
            el.appendChild(img);

            const pos = randomEdgePos();
            const rot = (Math.random() - 0.5) * 16;
            const scale = isMobile ? 0.7 + Math.random() * 0.2 : 0.8 + Math.random() * 0.3;

            el.style.cssText = `
                left: ${pos.x}px;
                top: ${pos.y}px;
                width: ${SIZE}px;
                transform: rotate(${rot}deg) scale(${scale});
                animation-delay: ${0.3 + i * 0.25}s;
                animation-fill-mode: forwards;
                opacity: 0;
            `;

            document.body.appendChild(el);

            polaroids.push({
                el, x: pos.x, y: pos.y,
                vx: (Math.random() - 0.5) * 0.08,
                vy: (Math.random() - 0.5) * 0.06,
                rot, rotSpeed: (Math.random() - 0.5) * 0.003,
                scale,
            });
        });

        // Gentle drift animation
        function driftPolaroids() {
            const w = window.innerWidth;
            const h = window.innerHeight;

            for (const p of polaroids) {
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.rotSpeed;

                // Soft bounce off edges
                if (p.x < -20 || p.x > w - SIZE + 20) p.vx *= -1;
                if (p.y < -20 || p.y > h - SIZE + 20) p.vy *= -1;

                p.el.style.left = p.x + 'px';
                p.el.style.top = p.y + 'px';
                p.el.style.transform = `rotate(${p.rot}deg) scale(${p.scale})`;
            }

            requestAnimationFrame(driftPolaroids);
        }
        driftPolaroids();

        // === CANVAS: Starfield + warm particles ===
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);

        function resize() {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        resize();
        window.addEventListener('resize', resize);

        const STAR_COUNT = Math.min(150, Math.floor(window.innerWidth * window.innerHeight / 6000));
        let stars = [];
        function makeStars() {
            stars = Array.from({ length: STAR_COUNT }, () => ({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                r: Math.random() * 1 + 0.2,
                phase: Math.random() * Math.PI * 2,
                speed: Math.random() * 0.6 + 0.2,
                base: Math.random() * 0.3 + 0.05,
            }));
        }
        makeStars();
        window.addEventListener('resize', makeStars);

        // Warm floating particles
        const PARTICLE_COUNT = 18;
        const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            r: Math.random() * 25 + 8,
            vx: (Math.random() - 0.5) * 0.12,
            vy: -(Math.random() * 0.15 + 0.03),
            hue: ['255,107,107', '255,160,80', '255,217,61', '200,140,100'][Math.floor(Math.random() * 4)],
            alpha: Math.random() * 0.03 + 0.01,
        }));

        function draw() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            const t = performance.now() * 0.001;

            // Background gradient
            const bg = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.7);
            bg.addColorStop(0, '#100a18');
            bg.addColorStop(1, '#0a0a12');
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, w, h);

            // Stars
            for (const s of stars) {
                const a = s.base + Math.sin(t * s.speed + s.phase) * 0.12;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${Math.max(0.01, a)})`;
                ctx.fill();
            }

            // Warm particles
            for (const p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.y < -p.r) { p.y = h + p.r; p.x = Math.random() * w; }
                if (p.x < -p.r) p.x = w + p.r;
                if (p.x > w + p.r) p.x = -p.r;

                const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
                g.addColorStop(0, `rgba(${p.hue},${p.alpha * 2.5})`);
                g.addColorStop(1, `rgba(${p.hue},0)`);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = g;
                ctx.fill();
            }

            requestAnimationFrame(draw);
        }
        draw();
    })();
    </script>
</body>
</html>
